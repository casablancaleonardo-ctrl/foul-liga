name: Pärkli Scraper

on:
  schedule:
    - cron: '0 15,17,19,21 * * 6'  # Samstag 17/19/21/23 Uhr CH
    - cron: '0 15,17,19,21 * * 0'  # Sonntag 17/19/21/23 Uhr CH
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python scraper-paerkli.py
      - name: Daten committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data-paerkli.json
          git diff --staged --quiet || git commit -m "Pärkli Daten aktualisiert"
          git pull --rebase --autostash
          git push
