name: Scrape foul.ch

on:
  schedule:
    - cron: '0 15,17,19,21 * * 0'  # Sonntag 17/19/21/23 Uhr CH
    - cron: '0 15,17,19,21 * * 6'  # Samstag 17/19/21/23 Uhr CH
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run scraper
        run: python scraper.py
      - name: Commit data.json
        run: |
          git config user.name "foul-bot"
          git config user.email "bot@foul.ch"
          git add data.json
          git diff --cached --quiet || git commit -m "Update: $(date '+%d.%m.%Y %H:%M')"
          git pull --rebase
          git push
